name: Build, Push and Deploy

on:
    push:
        branches:
            - main

permissions:
    id-token: write
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest

        outputs:
            image-tag: ${{ steps.image_meta.outputs.image_tag }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Azure Login
              uses: azure/login@v1
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Set image metadata
              id: image_meta
              run: |
                  echo "image_tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

            - name: Login to ACR
              run: |
                  az acr login --name acrdevacr

            - name: Build and Push
              run: |
                  docker build -t acrdevacr.azurecr.io/weather-app:${{ steps.image_meta.outputs.image_tag }} .
                  docker push acrdevacr.azurecr.io/weather-app:${{ steps.image_meta.outputs.image_tag }}

    deploy:
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Azure Login
              uses: azure/login@v1
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Deploy to Web App
              uses: azure/webapps-deploy@v2
              with:
                  app-name: acr-dev-webapp
                  images: acrdevacr.azurecr.io/weather-app:${{ needs.build.outputs.image-tag }}
